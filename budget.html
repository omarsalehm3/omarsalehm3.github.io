<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Budget | Omar's Toolkit</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body><nav class="navbar"><div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-tools"></i> Omar's Toolkit</a></div><div class="nav-links"><a href="index.html"><i class="fas fa-home"></i> Home</a><a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a><a href="timer.html"><i class="fas fa-clock"></i> Timer</a><a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a><a href="budget.html"><i class="fas fa-wallet"></i> Budget</a><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a><a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a><a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a><a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a></div><button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button></nav><div class="page-header"><h1><i class="fas fa-wallet"></i> Budget Calculator</h1><p>Track your income and expenses</p></div><div class="container"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px" id="summaryCards"><div class="card" style="text-align:center"><div class="text-muted">Total Income</div><div style="font-size:1.8rem;font-weight:700;color:#3fb950" id="totalIncome">$0</div></div><div class="card" style="text-align:center"><div class="text-muted">Total Expenses</div><div style="font-size:1.8rem;font-weight:700;color:#f85149" id="totalExpense">$0</div></div><div class="card" style="text-align:center"><div class="text-muted">Balance</div><div style="font-size:1.8rem;font-weight:700" id="balance">$0</div></div></div><div class="card"><h3 style="margin-bottom:15px">Add Transaction</h3><div class="flex flex-wrap" style="gap:10px"><input type="text" id="txDesc" placeholder="Description" style="flex:2;min-width:150px"><input type="number" id="txAmount" placeholder="Amount" style="flex:1;min-width:100px"><select id="txType" style="width:130px"><option value="income">Income</option><option value="expense">Expense</option></select><select id="txCategory" style="width:130px"><option value="food">Food</option><option value="transport">Transport</option><option value="housing">Housing</option><option value="health">Health</option><option value="entertainment">Entertainment</option><option value="salary">Salary</option><option value="other">Other</option></select><button class="btn btn-primary" onclick="addTransaction()"><i class="fas fa-plus"></i> Add</button></div></div><div class="card"><h3 style="margin-bottom:15px">Transactions <button class="btn btn-danger" style="float:right;padding:5px 12px;font-size:0.8rem" onclick="clearAll()">Clear All</button></h3><div id="txList"><div class="text-muted" style="text-align:center;padding:30px">No transactions yet.</div></div></div></div><script>
let txs=JSON.parse(localStorage.getItem("budget_txs")||"[]");
function addTransaction(){const desc=document.getElementById("txDesc").value.trim();const amt=parseFloat(document.getElementById("txAmount").value);if(!desc||!amt||amt<=0)return;txs.push({id:Date.now(),desc,amount:amt,type:document.getElementById("txType").value,category:document.getElementById("txCategory").value,date:new Date().toLocaleDateString()});document.getElementById("txDesc").value="";document.getElementById("txAmount").value="";save();}
function deleteTransaction(id){txs=txs.filter(t=>t.id!==id);save();}
function clearAll(){if(confirm("Clear all transactions?"))txs=[];save();}
function save(){localStorage.setItem("budget_txs",JSON.stringify(txs));render();}
function render(){const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);const bal=income-expense;document.getElementById("totalIncome").textContent="$"+income.toFixed(2);document.getElementById("totalExpense").textContent="$"+expense.toFixed(2);const balEl=document.getElementById("balance");balEl.textContent=(bal>=0?"$":"-$")+Math.abs(bal).toFixed(2);balEl.style.color=bal>=0?"#3fb950":"#f85149";const list=document.getElementById("txList");list.innerHTML=txs.length===0?'<div class="text-muted" style="text-align:center;padding:30px">No transactions yet.</div>':txs.slice().reverse().map(t=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #30363d"><div><div style="font-weight:500">'+t.desc+'</div><div class="text-muted" style="font-size:0.75rem">'+t.category+' &middot; '+t.date+'</div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-weight:700;color:'+(t.type==="income"?"#3fb950":"#f85149")+'">'+( t.type==="income"?"+":"-")+"$"+t.amount.toFixed(2)+'</span><button class="btn btn-danger" style="padding:4px 10px;font-size:0.75rem" onclick="deleteTransaction('+t.id+')"><i class="fas fa-trash"></i></button></div></div>').join('');}
function toggleTheme(){document.body.classList.toggle("light");const icon=document.querySelector(".theme-toggle i");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}
if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.querySelector(".theme-toggle i").classList.replace("fa-moon","fa-sun");}
render();
</script></body></html>
