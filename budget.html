<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Budget | OGuard Hub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-shield-alt"></i> OGuard Hub</a></div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a>
    <a href="timer.html"><i class="fas fa-clock"></i> Timer</a>
    <a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a>
    <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>
    <a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a>
    <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>
  </div>
  <div class="flex" style="gap:8px;align-items:center">
    <span id="navUser" style="display:none;font-size:0.85rem;color:#8b949e"></span>
    <button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-wallet"></i> Budget Calculator</h1>
  <p>Track your income and expenses</p>
</div>

<div class="container">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px">
    <div class="card" style="text-align:center">
      <div class="text-muted">Total Income</div>
      <div style="font-size:1.8rem;font-weight:700;color:#3fb950" id="totalIncome">$0.00</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="text-muted">Total Expenses</div>
      <div style="font-size:1.8rem;font-weight:700;color:#f85149" id="totalExpense">$0.00</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="text-muted">Balance</div>
      <div style="font-size:1.8rem;font-weight:700" id="balance">$0.00</div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:15px">Add Transaction</h3>
    <div class="flex flex-wrap" style="gap:10px">
      <input type="text" id="txDesc" placeholder="Description" style="flex:2;min-width:150px">
      <input type="number" id="txAmount" placeholder="Amount" style="flex:1;min-width:100px" min="0" step="0.01">
      <select id="txType" style="width:130px">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <select id="txCategory" style="width:130px">
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="housing">Housing</option>
        <option value="health">Health</option>
        <option value="entertainment">Entertainment</option>
        <option value="salary">Salary</option>
        <option value="other">Other</option>
      </select>
      <button class="btn btn-primary" onclick="addTransaction()"><i class="fas fa-plus"></i> Add</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:15px">Transactions <button class="btn btn-danger" style="float:right;padding:5px 12px;font-size:0.8rem" onclick="clearAll()">Clear All</button></h3>
    <div id="txList"><div class="text-muted" style="text-align:center;padding:30px">No transactions yet.</div></div>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
var txs = JSON.parse(localStorage.getItem('budget_txs') || '[]');

function addTransaction() {
  var desc = document.getElementById('txDesc').value.trim();
  var amt = parseFloat(document.getElementById('txAmount').value);
  if (!desc || !amt || amt <= 0) {
    alert('Please enter a description and a valid amount.');
    return;
  }
  txs.push({
    id: Date.now(),
    desc: desc,
    amount: amt,
    type: document.getElementById('txType').value,
    category: document.getElementById('txCategory').value,
    date: new Date().toLocaleDateString()
  });
  document.getElementById('txDesc').value = '';
  document.getElementById('txAmount').value = '';
  save();
}

function deleteTransaction(id) {
  txs = txs.filter(function(t) { return t.id !== id; });
  save();
}

function clearAll() {
  if (confirm('Clear all transactions? This cannot be undone.')) {
    txs = [];
    save();
  }
}

function save() {
  localStorage.setItem('budget_txs', JSON.stringify(txs));
  render();
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var income = 0, expense = 0;
  for (var i = 0; i < txs.length; i++) {
    if (txs[i].type === 'income') income += txs[i].amount;
    else expense += txs[i].amount;
  }
  var bal = income - expense;
  document.getElementById('totalIncome').textContent = '$' + income.toFixed(2);
  document.getElementById('totalExpense').textContent = '$' + expense.toFixed(2);
  var balEl = document.getElementById('balance');
  balEl.textContent = (bal >= 0 ? '$' : '-$') + Math.abs(bal).toFixed(2);
  balEl.style.color = bal >= 0 ? '#3fb950' : '#f85149';

  var list = document.getElementById('txList');
  if (txs.length === 0) {
    list.innerHTML = '<div class="text-muted" style="text-align:center;padding:30px">No transactions yet.</div>';
    return;
  }
  var reversed = txs.slice().reverse();
  var html = '';
  for (var j = 0; j < reversed.length; j++) {
    var t = reversed[j];
    var color = t.type === 'income' ? '#3fb950' : '#f85149';
    var sign = t.type === 'income' ? '+' : '-';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #30363d">';
    html += '<div>';
    html += '<div style="font-weight:500">' + escapeHtml(t.desc) + '</div>';
    html += '<div class="text-muted" style="font-size:0.75rem">' + escapeHtml(t.category) + ' &middot; ' + escapeHtml(t.date) + '</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:12px">';
    html += '<span style="font-weight:700;color:' + color + '">' + sign + '$' + t.amount.toFixed(2) + '</span>';
    html += '<button class="btn btn-danger" style="padding:4px 10px;font-size:0.75rem" onclick="deleteTransaction(' + t.id + ')"><i class="fas fa-trash"></i></button>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function toggleTheme() {
  document.body.classList.toggle('light');
  var icon = document.querySelector('.theme-toggle i');
  icon.classList.toggle('fa-moon');
  icon.classList.toggle('fa-sun');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
}

render();
</script>
</body>
</html>
