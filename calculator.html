<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculator | OGuard Hub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.calc-wrap{max-width:420px;margin:0 auto}
.calc-display{background:#0d1117;border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 24px 16px;text-align:right}
.calc-expr{font-size:0.85rem;color:var(--text2);min-height:22px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.calc-screen{font-size:2.8rem;font-weight:300;color:var(--text);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-1px}
.calc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border);border-radius:0 0 16px 16px;overflow:hidden}
.calc-btn{padding:18px 10px;font-size:1.1rem;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all 0.12s;background:var(--bg2);color:var(--text)}
.calc-btn:hover{filter:brightness(1.2)}
.calc-btn:active{transform:scale(0.95)}
.calc-btn.op{background:#1c2333;color:var(--blue)}
.calc-btn.fn{background:#161b22;color:var(--text2);font-size:0.95rem}
.calc-btn.eq{background:var(--grad);color:#fff;font-size:1.3rem}
.calc-btn.zero{grid-column:span 2}
.calc-history{margin-top:16px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg2);border-radius:8px;margin-bottom:6px;font-size:0.85rem;cursor:pointer;transition:background 0.15s}
.hist-item:hover{background:rgba(88,166,255,0.1)}
.hist-expr{color:var(--text2)}
.hist-result{color:var(--blue);font-weight:600}
body.light .calc-display{background:#f5f5f5}
body.light .calc-btn{background:#fff}
body.light .calc-btn.op{background:#e8f0fe;color:#1a73e8}
body.light .calc-btn.fn{background:#f8f9fa;color:#555}
</style>
</head>
<body>

  <div class="nav-brand">

    <a href="index.html" style="color:inherit;text-decoration:none;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">OGuard Hub</a>
  </div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <div class="nav-dropdown">
      <button class="nav-dropdown-btn"><i class="fas fa-th-large"></i> Tools <i class="fas fa-chevron-down" style="font-size:0.7rem;margin-left:2px"></i></button>
      <div class="nav-dropdown-menu">
        <a href="todo.html"><i class="fas fa-check-square"></i> To-Do List</a>
        <a href="timer.html"><i class="fas fa-clock"></i> Pomodoro Timer</a>
        <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>

        <a href="workout.html"><i class="fas fa-dumbbell"></i> Workout</a>
      </div>
    </div>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>

  <div class="nav-right">
    <span id="navUser" style="display:none;font-size:0.82rem;color:var(--text2)"></span>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-icon"><i class="fas fa-calculator"></i></div>
    <div><h1>Calculator</h1><p>Scientific calculator with history</p></div>
  </div>
</div>
<div class="container">
  <div class="calc-wrap">
    <div class="calc-display">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-screen" id="calcScreen">0</div>
    </div>
    <div class="calc-btns">
      <button class="calc-btn fn" onclick="calcFn('AC')">AC</button>
      <button class="calc-btn fn" onclick="calcFn('+/-')">+/-</button>
      <button class="calc-btn fn" onclick="calcFn('%')">%</button>
      <button class="calc-btn op" onclick="calcOp('/')">&#xF7;</button>
      <button class="calc-btn" onclick="calcNum('7')">7</button>
      <button class="calc-btn" onclick="calcNum('8')">8</button>
      <button class="calc-btn" onclick="calcNum('9')">9</button>
      <button class="calc-btn op" onclick="calcOp('*')">&#xD7;</button>
      <button class="calc-btn" onclick="calcNum('4')">4</button>
      <button class="calc-btn" onclick="calcNum('5')">5</button>
      <button class="calc-btn" onclick="calcNum('6')">6</button>
      <button class="calc-btn op" onclick="calcOp('-')">&#x2212;</button>
      <button class="calc-btn" onclick="calcNum('1')">1</button>
      <button class="calc-btn" onclick="calcNum('2')">2</button>
      <button class="calc-btn" onclick="calcNum('3')">3</button>
      <button class="calc-btn op" onclick="calcOp('+')">+</button>
      <button class="calc-btn zero" onclick="calcNum('0')">0</button>
      <button class="calc-btn" onclick="calcNum('.')">.</button>
      <button class="calc-btn eq" onclick="calcEquals()">=</button>
    </div>
  </div>
  <div class="calc-history card mt-2" id="historyCard" style="display:none">
    <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="margin:0">History</h3>
      <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.8rem" onclick="clearHistory()">Clear</button>
    </div>
    <div id="histList"></div>
  </div>
</div>
<script type="module" src="firebase-config.js"></script>
<script>
var current = '0', prev = '', op = '', freshResult = false;
var history = JSON.parse(localStorage.getItem('calc_history') || '[]');
function updateScreen() {
  var s = document.getElementById('calcScreen');
  var e = document.getElementById('calcExpr');
  s.textContent = current.length > 12 ? parseFloat(current).toExponential(4) : current;
  e.textContent = prev && op ? prev + ' ' + op : '';
}
function calcNum(n) {
  if (freshResult) { current = n === '.' ? '0.' : n; freshResult = false; }
  else if (n === '.' && current.includes('.')) return;
  else if (current === '0' && n !== '.') current = n;
  else current += n;
  updateScreen();
}
function calcOp(o) {
  if (prev && op && !freshResult) calcEquals(true);
  prev = current; op = o; freshResult = true; updateScreen();
}
function calcFn(fn) {
  var n = parseFloat(current);
  if (fn === 'AC') { current = '0'; prev = ''; op = ''; freshResult = false; }
  else if (fn === '+/-') { current = String(-n); }
  else if (fn === '%') { current = String(n / 100); }
  updateScreen();
}
function calcEquals(silent) {
  if (!prev || !op) return;
  var a = parseFloat(prev), b = parseFloat(current), r;
  var opSym = op;
  if (op === '+') r = a + b;
  else if (op === '-') r = a - b;
  else if (op === '*') r = a * b;
  else if (op === '/') r = b === 0 ? 'Error' : a / b;
  var expr = prev + ' ' + opSym + ' ' + current;
  current = String(r); prev = ''; op = ''; freshResult = true;
  if (!silent) {
    addHistory(expr, current);
    document.getElementById('calcExpr').textContent = expr + ' =';
  }
  updateScreen();
}
function addHistory(expr, result) {
  history.unshift({expr: expr, result: result, time: new Date().toLocaleTimeString()});
  if (history.length > 20) history.pop();
  localStorage.setItem('calc_history', JSON.stringify(history));
  renderHistory();
}
function clearHistory() { history = []; localStorage.removeItem('calc_history'); renderHistory(); }
function renderHistory() {
  var card = document.getElementById('historyCard');
  var list = document.getElementById('histList');
  if (history.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = history.map(function(h) {
    return '<div class="hist-item" onclick="useHistResult('' + encodeURIComponent(h.result) + '')">' +
      '<span class="hist-expr">' + h.expr + ' =</span><span class="hist-result">' + h.result + '</span></div>';
  }).join('');
}
function useHistResult(enc) { current = decodeURIComponent(enc); freshResult = true; updateScreen(); }
document.addEventListener('keydown', function(e) {
  if (e.key >= '0' && e.key <= '9') calcNum(e.key);
  else if (e.key === '.') calcNum('.');
  else if (e.key === '+') calcOp('+');
  else if (e.key === '-') calcOp('-');
  else if (e.key === '*') calcOp('*');
  else if (e.key === '/') { e.preventDefault(); calcOp('/'); }
  else if (e.key === 'Enter' || e.key === '=') calcEquals();
  else if (e.key === 'Backspace') { if (current.length > 1 && !freshResult) current = current.slice(0,-1); else current = '0'; updateScreen(); }
  else if (e.key === 'Escape') calcFn('AC');
});
renderHistory();
updateScreen();
function toggleTheme() {
  document.body.classList.toggle('light');
  var icon = document.querySelector('.theme-toggle i');
  icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
}
</script>
</body>
</html>
