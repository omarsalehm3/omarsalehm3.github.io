<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Weather | Omars Toolkit</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>.weather-main{text-align:center;padding:30px 0}.weather-temp{font-size:5rem;font-weight:300;color:#58a6ff}.weather-icon{font-size:4rem;margin:10px 0}.weather-desc{font-size:1.2rem;color:#8b949e;text-transform:capitalize;margin-bottom:5px}.weather-city{font-size:1.5rem;font-weight:600;margin-bottom:5px}.weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:20px}.weather-stat{background:rgba(88,166,255,0.08);border:1px solid #30363d;border-radius:10px;padding:14px;text-align:center}.weather-stat .label{font-size:0.75rem;color:#8b949e;margin-bottom:4px}.weather-stat .value{font-size:1.1rem;font-weight:600;color:#e6edf3}</style></head><body><nav class="navbar"><div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-tools"></i> Omars Toolkit</a></div><div class="nav-links"><a href="index.html"><i class="fas fa-home"></i> Home</a><a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a><a href="timer.html"><i class="fas fa-clock"></i> Timer</a><a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a><a href="budget.html"><i class="fas fa-wallet"></i> Budget</a><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a><a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a><a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a><a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a></div><button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button></nav><div class="page-header"><h1><i class="fas fa-cloud-sun"></i> Weather</h1><p>Check current weather for any city</p></div><div class="container"><div class="card"><div class="flex flex-wrap" style="gap:10px"><input type="text" id="cityInput" placeholder="Enter city name (e.g. London, Cairo, New York)..." style="flex:1"><button class="btn btn-primary" onclick="getWeather()"><i class="fas fa-search"></i> Search</button><button class="btn btn-secondary" onclick="getByLocation()"><i class="fas fa-location-arrow"></i> My Location</button></div></div><div id="weatherResult"></div><div class="card mt-2"><h3 style="margin-bottom:12px"><i class="fas fa-info-circle"></i> Setup Required</h3><p class="text-muted">To use live weather data, get a free API key from <a href="https://openweathermap.org/api" target="_blank" style="color:#58a6ff">OpenWeatherMap</a> and enter it below:</p><div class="flex mt-2" style="gap:10px"><input type="text" id="apiKeyInput" placeholder="Enter your free API key here..."><button class="btn btn-success" onclick="saveApiKey()"><i class="fas fa-save"></i> Save Key</button></div><div id="apiStatus" class="text-muted mt-1"></div></div></div><script>let apiKey=localStorage.getItem("owm_key")||"";if(apiKey){document.getElementById("apiKeyInput").value=apiKey;document.getElementById("apiStatus").textContent="API key saved!";document.getElementById("apiStatus").style.color="#3fb950";}function saveApiKey(){apiKey=document.getElementById("apiKeyInput").value.trim();if(apiKey){localStorage.setItem("owm_key",apiKey);document.getElementById("apiStatus").textContent="API key saved successfully!";document.getElementById("apiStatus").style.color="#3fb950";}else{document.getElementById("apiStatus").textContent="Please enter a valid API key.";document.getElementById("apiStatus").style.color="#f85149";}}async function getWeather(){const city=document.getElementById("cityInput").value.trim();if(!city)return;if(!apiKey){showNoKey();return;}showLoading();try{const r=await fetch("https://api.openweathermap.org/data/2.5/weather?q="+encodeURIComponent(city)+"&appid="+apiKey+"&units=metric");if(!r.ok)throw new Error("City not found");const d=await r.json();showWeather(d);}catch(e){document.getElementById("weatherResult").innerHTML="<div class="card" style="text-align:center;color:#f85149"><i class="fas fa-exclamation-circle" style="font-size:2rem"></i><br><br>"+e.message+"</div>";}}async function getByLocation(){if(!apiKey){showNoKey();return;}if(!navigator.geolocation){alert("Geolocation not supported");return;}showLoading();navigator.geolocation.getCurrentPosition(async function(pos){try{const r=await fetch("https://api.openweathermap.org/data/2.5/weather?lat="+pos.coords.latitude+"&lon="+pos.coords.longitude+"&appid="+apiKey+"&units=metric");const d=await r.json();showWeather(d);}catch(e){document.getElementById("weatherResult").innerHTML="<div class="card" style="text-align:center;color:#f85149">Error fetching weather</div>";}});}function showLoading(){document.getElementById("weatherResult").innerHTML="<div class="card" style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#58a6ff"></i><br><br>Loading...</div>";}function showNoKey(){document.getElementById("weatherResult").innerHTML="<div class="card" style="text-align:center;color:#d29922"><i class="fas fa-key" style="font-size:2rem"></i><br><br>Please enter your OpenWeatherMap API key below first!</div>";}function showWeather(d){const icons={Clear:"fa-sun",Clouds:"fa-cloud",Rain:"fa-cloud-rain",Snow:"fa-snowflake",Thunderstorm:"fa-bolt",Drizzle:"fa-cloud-drizzle",Mist:"fa-smog",Fog:"fa-smog"};const icon=icons[d.weather[0].main]||"fa-cloud";const sunrise=new Date(d.sys.sunrise*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});const sunset=new Date(d.sys.sunset*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});document.getElementById("weatherResult").innerHTML="<div class="card"><div class="weather-main"><div class="weather-city">"+d.name+", "+d.sys.country+"</div><div class="weather-icon"><i class="fas "+icon+"" style="color:#58a6ff"></i></div><div class="weather-temp">"+Math.round(d.main.temp)+"°C</div><div class="weather-desc">"+d.weather[0].description+"</div><div class="text-muted">Feels like "+Math.round(d.main.feels_like)+"°C</div></div><div class="weather-grid"><div class="weather-stat"><div class="label">Humidity</div><div class="value">"+d.main.humidity+"%</div></div><div class="weather-stat"><div class="label">Wind Speed</div><div class="value">"+d.wind.speed+" m/s</div></div><div class="weather-stat"><div class="label">Pressure</div><div class="value">"+d.main.pressure+" hPa</div></div><div class="weather-stat"><div class="label">Visibility</div><div class="value">"+(d.visibility/1000).toFixed(1)+" km</div></div><div class="weather-stat"><div class="label">Min / Max</div><div class="value">"+Math.round(d.main.temp_min)+" / "+Math.round(d.main.temp_max)+"°C</div></div><div class="weather-stat"><div class="label">Sunrise</div><div class="value">"+sunrise+"</div></div><div class="weather-stat"><div class="label">Sunset</div><div class="value">"+sunset+"</div></div><div class="weather-stat"><div class="label">Cloudiness</div><div class="value">"+d.clouds.all+"%</div></div></div></div>";}document.getElementById("cityInput").addEventListener("keypress",function(e){if(e.key==="Enter")getWeather();});function toggleTheme(){document.body.classList.toggle("light");const icon=document.querySelector(".theme-toggle i");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.querySelector(".theme-toggle i").classList.replace("fa-moon","fa-sun");}</script></body></html>
