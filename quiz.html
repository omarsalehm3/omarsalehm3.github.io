<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quiz | OGuard Hub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.quiz-opt{width:100%;text-align:left;padding:14px 18px;border-radius:10px;border:1px solid #30363d;background:none;color:#e6edf3;cursor:pointer;font-family:inherit;font-size:0.95rem;transition:all 0.2s;margin-bottom:8px}
.quiz-opt:hover:not(:disabled){border-color:#58a6ff;background:rgba(88,166,255,0.08)}
.quiz-opt.correct{border-color:#3fb950;background:rgba(63,185,80,0.15);color:#3fb950}
.quiz-opt.wrong{border-color:#f85149;background:rgba(248,81,73,0.15);color:#f85149}
body.light .quiz-opt{color:#1a1a2e}
.progress-bar{height:6px;background:#30363d;border-radius:3px;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:3px;transition:width 0.3s}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-shield-alt"></i> OGuard Hub</a></div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a>
    <a href="timer.html"><i class="fas fa-clock"></i> Timer</a>
    <a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a>
    <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>
    <a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a>
    <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>
  </div>
  <div class="flex" style="gap:8px;align-items:center">
    <span id="navUser" style="display:none;font-size:0.85rem;color:#8b949e"></span>
    <button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-question-circle"></i> Quiz Game</h1>
  <p>Test your general knowledge!</p>
</div>

<div class="container">
  <div class="card" id="quizCard">
    <div id="quizContent"></div>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
var questions = [
  {q:'What is the capital of France?', opts:['London','Berlin','Paris','Madrid'], ans:2},
  {q:'Which planet is called the Red Planet?', opts:['Venus','Mars','Jupiter','Saturn'], ans:1},
  {q:'What is 15 x 15?', opts:['200','215','225','235'], ans:2},
  {q:'Who wrote Romeo and Juliet?', opts:['Charles Dickens','William Shakespeare','Jane Austen','Mark Twain'], ans:1},
  {q:'What is the largest ocean on Earth?', opts:['Atlantic','Indian','Arctic','Pacific'], ans:3},
  {q:'How many continents are there on Earth?', opts:['5','6','7','8'], ans:2},
  {q:'What is the chemical symbol for gold?', opts:['Ag','Go','Au','Gd'], ans:2},
  {q:'What is the speed of light (approximate)?', opts:['300,000 km/s','150,000 km/s','500,000 km/s','1,000,000 km/s'], ans:0},
  {q:'How many bones are in an adult human body?', opts:['196','206','216','226'], ans:1},
  {q:'In what year did World War II end?', opts:['1943','1944','1945','1946'], ans:2},
  {q:'What is the tallest mountain on Earth?', opts:['K2','Everest','Kilimanjaro','Mont Blanc'], ans:1},
  {q:'Which element has atomic number 1?', opts:['Helium','Oxygen','Hydrogen','Carbon'], ans:2},
  {q:'What language has the most native speakers?', opts:['English','Spanish','Mandarin','Hindi'], ans:2},
  {q:'What are the first 3 digits of Pi?', opts:['3.14','3.16','3.12','3.18'], ans:0},
  {q:'What is the smallest planet in our solar system?', opts:['Mars','Mercury','Pluto','Venus'], ans:1}
];

var current = 0, score = 0, answered = false, shuffled = [];

function startQuiz() {
  var copy = questions.slice();
  for (var i = copy.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = copy[i]; copy[i] = copy[j]; copy[j] = temp;
  }
  shuffled = copy.slice(0, 10);
  current = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  var q = shuffled[current];
  var pct = (current / shuffled.length) * 100;

  var content = document.getElementById('quizContent');
  content.innerHTML = '';

  var bar = document.createElement('div');
  bar.className = 'progress-bar';
  var fill = document.createElement('div');
  fill.className = 'progress-fill';
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  content.appendChild(bar);

  var info = document.createElement('div');
  info.className = 'text-muted';
  info.style.marginBottom = '8px';
  info.textContent = 'Question ' + (current + 1) + ' of ' + shuffled.length + ' · Score: ' + score;
  content.appendChild(info);

  var qText = document.createElement('h3');
  qText.style.cssText = 'margin-bottom:20px;font-size:1.1rem';
  qText.textContent = q.q;
  content.appendChild(qText);

  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.id = 'opt' + i;
    btn.textContent = q.opts[i];
    btn.setAttribute('data-idx', i);
    btn.addEventListener('click', makeAnswerHandler(i));
    content.appendChild(btn);
  }
}

function makeAnswerHandler(idx) {
  return function() { answer(idx); };
}

function answer(idx) {
  if (answered) return;
  answered = true;
  var q = shuffled[current];
  if (idx === q.ans) {
    score++;
    document.getElementById('opt' + idx).classList.add('correct');
  } else {
    document.getElementById('opt' + idx).classList.add('wrong');
    document.getElementById('opt' + q.ans).classList.add('correct');
  }
  var opts = document.querySelectorAll('.quiz-opt');
  for (var i = 0; i < opts.length; i++) { opts[i].disabled = true; }
  setTimeout(function() {
    current++;
    if (current < shuffled.length) showQuestion();
    else showResult();
  }, 1200);
}

function showResult() {
  var pct = Math.round((score / shuffled.length) * 100);
  var grade = pct >= 80 ? 'Excellent!' : pct >= 60 ? 'Good job!' : pct >= 40 ? 'Keep practicing!' : 'Try again!';
  var emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : pct >= 40 ? '📚' : '💪';

  var content = document.getElementById('quizContent');
  content.innerHTML = '';

  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'text-align:center;padding:30px 0';

  var emojiDiv = document.createElement('div');
  emojiDiv.style.cssText = 'font-size:4rem;margin-bottom:15px';
  emojiDiv.textContent = emoji;

  var gradeEl = document.createElement('h2');
  gradeEl.style.marginBottom = '8px';
  gradeEl.textContent = grade;

  var scoreEl = document.createElement('p');
  scoreEl.className = 'text-muted';
  scoreEl.style.marginBottom = '20px';
  scoreEl.textContent = 'You scored ' + score + ' out of ' + shuffled.length + ' (' + pct + '%)';

  var btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.innerHTML = '<i class="fas fa-redo"></i> Play Again';
  btn.addEventListener('click', startQuiz);

  wrapper.appendChild(emojiDiv);
  wrapper.appendChild(gradeEl);
  wrapper.appendChild(scoreEl);
  wrapper.appendChild(btn);
  content.appendChild(wrapper);
}

function toggleTheme() {
  document.body.classList.toggle('light');
  var icon = document.querySelector('.theme-toggle i');
  icon.classList.toggle('fa-moon');
  icon.classList.toggle('fa-sun');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
}

startQuiz();
</script>
</body>
</html>
