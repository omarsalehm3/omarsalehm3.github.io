<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz | OGuard Hub</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>.quiz-opt{width:100%;text-align:left;padding:14px 18px;border-radius:10px;border:1px solid #30363d;background:none;color:#e6edf3;cursor:pointer;font-family:inherit;font-size:0.95rem;transition:all 0.2s;margin-bottom:8px}.quiz-opt:hover{border-color:#58a6ff;background:rgba(88,166,255,0.08)}.quiz-opt.correct{border-color:#3fb950;background:rgba(63,185,80,0.15);color:#3fb950}.quiz-opt.wrong{border-color:#f85149;background:rgba(248,81,73,0.15);color:#f85149}body.light .quiz-opt{color:#1a1a2e}.progress-bar{height:6px;background:#30363d;border-radius:3px;margin-bottom:20px}.progress-fill{height:100%;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:3px;transition:width 0.3s}</style></head><body><nav class="navbar"><div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-shield-alt"></i> OGuard Hub</a></div><div class="nav-links"><a href="index.html"><i class="fas fa-home"></i> Home</a><a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a><a href="timer.html"><i class="fas fa-clock"></i> Timer</a><a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a><a href="budget.html"><i class="fas fa-wallet"></i> Budget</a><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a><a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a><a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a><a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a></div><div class="flex" style="gap:8px;align-items:center"><span id="navUser" style="display:none;font-size:0.85rem;color:#8b949e"></span><button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button><button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button></div></nav><div class="page-header"><h1><i class="fas fa-question-circle"></i> Quiz Game</h1><p>Test your general knowledge!</p></div><div class="container"><div class="card" id="quizCard"><div id="quizContent"></div></div></div><script type="module" src="firebase-config.js"></script><script>const questions=[{q:"What is the capital of France?",opts:["London","Berlin","Paris","Madrid"],ans:2},{q:"Which planet is the Red Planet?",opts:["Venus","Mars","Jupiter","Saturn"],ans:1},{q:"What is 15 x 15?",opts:["200","215","225","235"],ans:2},{q:"Who wrote Romeo and Juliet?",opts:["Charles Dickens","William Shakespeare","Jane Austen","Mark Twain"],ans:1},{q:"What is the largest ocean?",opts:["Atlantic","Indian","Arctic","Pacific"],ans:3},{q:"How many continents are on Earth?",opts:["5","6","7","8"],ans:2},{q:"Chemical symbol for gold?",opts:["Ag","Go","Au","Gd"],ans:2},{q:"Which country invented the internet?",opts:["Japan","USA","UK","Germany"],ans:1},{q:"Speed of light (approx)?",opts:["300,000 km/s","150,000 km/s","500,000 km/s","1,000,000 km/s"],ans:0},{q:"Bones in adult human body?",opts:["196","206","216","226"],ans:1},{q:"Year World War II ended?",opts:["1943","1944","1945","1946"],ans:2},{q:"Tallest mountain on Earth?",opts:["K2","Everest","Kilimanjaro","Mont Blanc"],ans:1},{q:"Element with atomic number 1?",opts:["Helium","Oxygen","Hydrogen","Carbon"],ans:2},{q:"Language with most native speakers?",opts:["English","Spanish","Mandarin","Hindi"],ans:2},{q:"First 3 digits of Pi?",opts:["3.14","3.16","3.12","3.18"],ans:0}];let current=0,score=0,answered=false,shuffled=[];function startQuiz(){shuffled=[...questions].sort(function(){return Math.random()-0.5}).slice(0,10);current=0;score=0;showQuestion();}function showQuestion(){answered=false;const q=shuffled[current];const pct=(current/shuffled.length)*100;document.getElementById("quizContent").innerHTML="<div class="progress-bar"><div class="progress-fill" style="width:"+pct+"%"></div></div><div class="text-muted" style="margin-bottom:8px">Question "+(current+1)+" of "+shuffled.length+" &middot; Score: "+score+"</div><h3 style="margin-bottom:20px;font-size:1.1rem">"+q.q+"</h3>"+q.opts.map(function(o,i){return "<button class="quiz-opt" id="opt"+i+"" onclick="answer("+i+")">"+o+"</button>"}).join("");}function answer(idx){if(answered)return;answered=true;const q=shuffled[current];if(idx===q.ans){score++;document.getElementById("opt"+idx).classList.add("correct");}else{document.getElementById("opt"+idx).classList.add("wrong");document.getElementById("opt"+q.ans).classList.add("correct");}document.querySelectorAll(".quiz-opt").forEach(function(b){b.disabled=true});setTimeout(function(){current++;if(current<shuffled.length)showQuestion();else showResult();},1200);}function showResult(){const pct=Math.round((score/shuffled.length)*100);const grade=pct>=80?"Excellent!":pct>=60?"Good job!":pct>=40?"Keep practicing!":"Try again!";document.getElementById("quizContent").innerHTML="<div style="text-align:center;padding:30px 0"><div style="font-size:4rem;margin-bottom:15px">"+(pct>=80?"🏆":pct>=60?"🎯":pct>=40?"📚":"💪")+"</div><h2 style="margin-bottom:8px">"+grade+"</h2><p class="text-muted" style="margin-bottom:20px">You scored "+score+" out of "+shuffled.length+" ("+pct+"%)</p><button class="btn btn-primary" onclick="startQuiz()"><i class="fas fa-redo"></i> Play Again</button></div>";}function toggleTheme(){document.body.classList.toggle("light");const icon=document.querySelector(".theme-toggle i");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.querySelector(".theme-toggle i").classList.replace("fa-moon","fa-sun");}startQuiz();</script></body></html>
