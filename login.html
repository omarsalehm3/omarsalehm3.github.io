<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>OGuard Hub - Sign In</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}body.light{background:#f0f2f5;color:#1a1a2e}.auth-card{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}body.light .auth-card{background:#fff;border-color:#e0e0e0}.auth-logo{text-align:center;margin-bottom:30px}.auth-logo i{font-size:2.5rem;background:linear-gradient(135deg,#58a6ff,#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.auth-logo h1{font-size:1.8rem;font-weight:700;margin-top:10px;background:linear-gradient(135deg,#58a6ff,#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.auth-logo p{color:#8b949e;font-size:0.875rem;margin-top:6px}.tabs{display:flex;background:#0d1117;border-radius:10px;padding:4px;margin-bottom:25px}body.light .tabs{background:#f0f2f5}.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:500;color:#8b949e;transition:all 0.2s;border:none;background:none;font-family:inherit}.tab.active{background:#58a6ff;color:#fff}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:0.85rem;color:#8b949e;margin-bottom:6px}.form-group input{width:100%;padding:12px 16px;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.2s}body.light .form-group input{background:#f5f5f5;border-color:#ddd;color:#1a1a2e}.form-group input:focus{border-color:#58a6ff}.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#58a6ff,#a371f7);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity 0.2s;margin-top:5px}.auth-btn:hover{opacity:0.9}.auth-btn:disabled{opacity:0.5;cursor:not-allowed}.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:#6e7681;font-size:0.8rem}.divider::before,.divider::after{content:"";flex:1;height:1px;background:#30363d}.google-btn{width:100%;padding:12px;background:none;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-size:0.95rem;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s}body.light .google-btn{color:#1a1a2e;border-color:#ddd}.google-btn:hover{background:rgba(88,166,255,0.08);border-color:#58a6ff}.msg{padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:12px;display:none}.msg.error{background:rgba(248,81,73,0.15);border:1px solid #f85149;color:#f85149}.msg.success{background:rgba(63,185,80,0.15);border:1px solid #3fb950;color:#3fb950}.theme-toggle-btn{position:fixed;top:20px;right:20px;background:#161b22;border:1px solid #30363d;color:#8b949e;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:0.9rem}body.light .theme-toggle-btn{background:#fff;border-color:#ddd}.pass-wrap{position:relative}.pass-wrap input{padding-right:44px}.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8b949e;cursor:pointer;font-size:0.9rem}.tagline{text-align:center;font-size:0.75rem;color:#6e7681;margin-top:20px;letter-spacing:0.5px}</style></head><body><button class="theme-toggle-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button><div class="auth-card"><div class="auth-logo"><i class="fas fa-shield-alt"></i><h1>OGuard Hub</h1><p>One place. Every tool. Always guarded.</p></div><div class="tabs"><button class="tab active" id="loginTab" onclick="switchTab('login')">Sign In</button><button class="tab" id="signupTab" onclick="switchTab('signup')">Create Account</button></div><div id="msgBox" class="msg"></div><div id="loginForm"><div class="form-group"><label>Email Address</label><input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"></div><div class="form-group"><label>Password</label><div class="pass-wrap"><input type="password" id="loginPass" placeholder="Your password" autocomplete="current-password"><button class="pass-toggle" onclick="togglePass('loginPass',this)"><i class="fas fa-eye"></i></button></div></div><button class="auth-btn" onclick="loginUser()" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button><div class="divider">or</div><button class="google-btn" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google</button></div><div id="signupForm" style="display:none"><div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name" autocomplete="name"></div><div class="form-group"><label>Email Address</label><input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"></div><div class="form-group"><label>Password</label><div class="pass-wrap"><input type="password" id="signupPass" placeholder="At least 6 characters" autocomplete="new-password"><button class="pass-toggle" onclick="togglePass('signupPass',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm Password</label><div class="pass-wrap"><input type="password" id="signupPass2" placeholder="Repeat password" autocomplete="new-password"><button class="pass-toggle" onclick="togglePass('signupPass2',this)"><i class="fas fa-eye"></i></button></div></div><button class="auth-btn" onclick="signupUser()" id="signupBtn"><i class="fas fa-user-plus"></i> Create Account</button><div class="divider">or</div><button class="google-btn" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google</button></div><p class="tagline">Shield Secure | Free | Always Yours</p></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,updateProfile}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";const firebaseConfig={apiKey:"AIzaSyB-DBlNO7_zDscN9bN_FjaQfSSqsdkF8xw",authDomain:"oguard-hub.firebaseapp.com",projectId:"oguard-hub",storageBucket:"oguard-hub.firebasestorage.app",messagingSenderId:"716243448619",appId:"1:716243448619:web:7d0af721f85b630ac04b6e"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);onAuthStateChanged(auth,function(user){if(user)window.location.href="index.html";});const provider=new GoogleAuthProvider();window.loginUser=async function(){const email=document.getElementById("loginEmail").value.trim();const pass=document.getElementById("loginPass").value;if(!email||!pass){showMsg("Please fill in all fields","error");return;}setLoading("loginBtn",true);try{await signInWithEmailAndPassword(auth,email,pass);showMsg("Welcome back! Redirecting...","success");}catch(e){showMsg(getFriendlyError(e.code),"error");setLoading("loginBtn",false);}};window.signupUser=async function(){const name=document.getElementById("signupName").value.trim();const email=document.getElementById("signupEmail").value.trim();const pass=document.getElementById("signupPass").value;const pass2=document.getElementById("signupPass2").value;if(!name||!email||!pass){showMsg("Please fill in all fields","error");return;}if(pass!==pass2){showMsg("Passwords do not match","error");return;}if(pass.length<6){showMsg("Password must be at least 6 characters","error");return;}setLoading("signupBtn",true);try{const cred=await createUserWithEmailAndPassword(auth,email,pass);await updateProfile(cred.user,{displayName:name});showMsg("Account created! Redirecting...","success");}catch(e){showMsg(getFriendlyError(e.code),"error");setLoading("signupBtn",false);}};window.loginGoogle=async function(){try{await signInWithPopup(auth,provider);}catch(e){showMsg(getFriendlyError(e.code),"error");}};function getFriendlyError(code){const errors={"auth/user-not-found":"No account found with this email.","auth/wrong-password":"Incorrect password.","auth/invalid-credential":"Invalid email or password.","auth/email-already-in-use":"Email already registered. Try signing in.","auth/weak-password":"Password too weak. Use at least 6 characters.","auth/invalid-email":"Please enter a valid email.","auth/too-many-requests":"Too many attempts. Please wait.","auth/network-request-failed":"Network error. Check your connection.","auth/popup-closed-by-user":"Sign-in popup was closed."};return errors[code]||"An error occurred ("+code+"). Please try again.";}function showMsg(text,type){const box=document.getElementById("msgBox");box.textContent=text;box.className="msg "+type;box.style.display="block";}function setLoading(id,loading){const btn=document.getElementById(id);btn.disabled=loading;btn.innerHTML=loading?"<i class="fas fa-spinner fa-spin"></i> Please wait...":(id==="loginBtn"?"<i class="fas fa-sign-in-alt"></i> Sign In":"<i class="fas fa-user-plus"></i> Create Account");}document.getElementById("loginPass").addEventListener("keypress",function(e){if(e.key==="Enter")window.loginUser();});document.getElementById("signupPass2").addEventListener("keypress",function(e){if(e.key==="Enter")window.signupUser();});</script><script>function switchTab(tab){document.getElementById("loginForm").style.display=tab==="login"?"block":"none";document.getElementById("signupForm").style.display=tab==="signup"?"block":"none";document.getElementById("loginTab").classList.toggle("active",tab==="login");document.getElementById("signupTab").classList.toggle("active",tab==="signup");document.getElementById("msgBox").style.display="none";}function togglePass(id,btn){const input=document.getElementById(id);const isText=input.type==="text";input.type=isText?"password":"text";btn.innerHTML=isText?"<i class="fas fa-eye"></i>":"<i class="fas fa-eye-slash"></i>";}function toggleTheme(){document.body.classList.toggle("light");const icon=document.getElementById("themeIcon");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.getElementById("themeIcon").classList.replace("fa-moon","fa-sun");}</script></body></html>
