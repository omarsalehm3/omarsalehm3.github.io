<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pomodoro Timer | OGuard Hub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.timer-circle{width:240px;height:240px;border-radius:50%;border:6px solid var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:30px auto;background:rgba(88,166,255,0.05);box-shadow:0 0 40px rgba(88,166,255,0.2);transition:all 0.4s ease}
.timer-circle.break{border-color:#3fb950;box-shadow:0 0 40px rgba(63,185,80,0.2)}
.timer-display{font-size:3.5rem;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums}
.timer-circle.break .timer-display{color:#3fb950}
.timer-label{font-size:0.9rem;color:var(--text2);margin-top:4px;letter-spacing:0.1em}
.mode-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.2s;font-size:0.85rem}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.timer-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.session-count{text-align:center;color:var(--text2);margin-top:15px;font-size:0.9rem}
.session-dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.session-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background 0.3s}
.session-dot.done{background:var(--blue)}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-brand-icon"><i class="fas fa-shield-alt"></i></div>
    <a href="index.html" style="color:inherit;text-decoration:none;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">OGuard Hub</a>
  </div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a>
    <a href="timer.html" class="active"><i class="fas fa-clock"></i> Timer</a>
    <a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a>
    <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>
    <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
    <a href="habits.html"><i class="fas fa-fire"></i> Habits</a>
    <a href="passwords.html"><i class="fas fa-key"></i> Passwords</a>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>
  </div>
  <div class="nav-right">
    <span id="navUser" style="display:none;font-size:0.82rem;color:var(--text2)"></span>
    <button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="page-header">
  <div class="page-header-inner">
    <div class="page-icon"><i class="fas fa-clock"></i></div>
    <div>
      <h1>Pomodoro Timer</h1>
      <p>Stay focused with timed work and break sessions</p>
    </div>
  </div>
</div>
<div class="container">
  <div class="card" style="text-align:center">
    <div class="mode-btns">
      <button class="mode-btn active" id="modeWork" onclick="setMode('work')">Work (25m)</button>
      <button class="mode-btn" id="modeShort" onclick="setMode('short')">Short Break (5m)</button>
      <button class="mode-btn" id="modeLong" onclick="setMode('long')">Long Break (15m)</button>
    </div>
    <div class="timer-circle" id="timerCircle">
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">FOCUS TIME</div>
    </div>
    <div class="timer-controls">
      <button class="btn btn-primary" onclick="startStop()" id="startBtn"><i class="fas fa-play"></i> Start</button>
      <button class="btn btn-secondary" onclick="resetTimer()"><i class="fas fa-redo"></i> Reset</button>
    </div>
    <div class="session-count">Sessions completed today: <strong id="sessionCount">0</strong></div>
    <div class="session-dots" id="sessionDots"></div>
  </div>
  <div class="card mt-2">
    <h3 style="margin-bottom:12px">Custom Time</h3>
    <div class="flex flex-wrap" style="gap:10px">
      <div style="flex:1"><label class="text-muted">Work (min)</label><input type="number" id="customWork" value="25" min="1" max="60" style="margin-top:6px"></div>
      <div style="flex:1"><label class="text-muted">Short Break</label><input type="number" id="customShort" value="5" min="1" max="30" style="margin-top:6px"></div>
      <div style="flex:1"><label class="text-muted">Long Break</label><input type="number" id="customLong" value="15" min="1" max="60" style="margin-top:6px"></div>
    </div>
    <button class="btn btn-primary mt-2" onclick="applyCustom()"><i class="fas fa-check"></i> Apply</button>
  </div>
</div>
<script type="module" src="firebase-config.js"></script>
<script>
var modes = {work: 25*60, short: 5*60, long: 15*60};
var currentMode = 'work';
var timeLeft = modes.work;
var timerInterval = null;
var running = false;
var sessions = parseInt(localStorage.getItem('pomSessions') || '0');
document.getElementById('sessionCount').textContent = sessions;
renderDots();
function renderDots() {
  var dots = document.getElementById('sessionDots');
  var html = '';
  for (var i = 0; i < 4; i++) { html += '<div class="session-dot' + (i < sessions % 4 ? ' done' : '') + '"></div>'; }
  dots.innerHTML = html;
}
function setMode(m) {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null; running = false; currentMode = m; timeLeft = modes[m];
  var startBtn = document.getElementById('startBtn');
  startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
  document.getElementById('modeWork').classList.remove('active');
  document.getElementById('modeShort').classList.remove('active');
  document.getElementById('modeLong').classList.remove('active');
  if (m === 'work') document.getElementById('modeWork').classList.add('active');
  if (m === 'short') document.getElementById('modeShort').classList.add('active');
  if (m === 'long') document.getElementById('modeLong').classList.add('active');
  var labels = {work: 'FOCUS TIME', short: 'SHORT BREAK', long: 'LONG BREAK'};
  document.getElementById('timerLabel').textContent = labels[m];
  var circle = document.getElementById('timerCircle');
  if (m === 'work') circle.classList.remove('break'); else circle.classList.add('break');
  updateDisplay();
}
function updateDisplay() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  var mm = m < 10 ? '0' + m : '' + m;
  var ss = s < 10 ? '0' + s : '' + s;
  document.getElementById('timerDisplay').textContent = mm + ':' + ss;
  document.title = mm + ':' + ss + ' | Pomodoro';
}
function startStop() {
  var startBtn = document.getElementById('startBtn');
  if (running) {
    clearInterval(timerInterval); timerInterval = null; running = false;
    startBtn.innerHTML = '<i class="fas fa-play"></i> Resume';
  } else {
    running = true;
    startBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
    timerInterval = setInterval(function() {
      if (timeLeft > 0) { timeLeft--; updateDisplay(); }
      else {
        clearInterval(timerInterval); timerInterval = null; running = false;
        startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
        if (currentMode === 'work') {
          sessions++;
          localStorage.setItem('pomSessions', sessions);
          document.getElementById('sessionCount').textContent = sessions;
          renderDots();
        }
        var msg = currentMode === 'work' ? 'Time for a break!' : 'Break over! Back to work!';
        alert(msg);
      }
    }, 1000);
  }
}
function resetTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null; running = false; timeLeft = modes[currentMode];
  document.getElementById('startBtn').innerHTML = '<i class="fas fa-play"></i> Start';
  updateDisplay();
}
function applyCustom() {
  modes.work = (parseInt(document.getElementById('customWork').value) || 25) * 60;
  modes.short = (parseInt(document.getElementById('customShort').value) || 5) * 60;
  modes.long = (parseInt(document.getElementById('customLong').value) || 15) * 60;
  setMode(currentMode);
}
function toggleTheme() {
  document.body.classList.toggle('light');
  var icon = document.querySelector('.theme-toggle i');
  icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
}
</script>
</body>
</html>
