<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pomodoro Timer | Omar's Toolkit</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.timer-circle{width:240px;height:240px;border-radius:50%;border:6px solid #58a6ff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:30px auto;background:rgba(88,166,255,0.05);box-shadow:0 0 40px rgba(88,166,255,0.2);}
.timer-display{font-size:3.5rem;font-weight:700;color:#58a6ff;}
.timer-label{font-size:0.9rem;color:#8b949e;margin-top:4px;}
.mode-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.mode-btn{padding:8px 20px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.mode-btn.active{background:#58a6ff;color:#fff;border-color:#58a6ff;}
.timer-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.session-count{text-align:center;color:#8b949e;margin-top:15px;font-size:0.9rem;}
</style>
</head>
<body><nav class="navbar"><div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-tools"></i> Omar's Toolkit</a></div><div class="nav-links"><a href="index.html"><i class="fas fa-home"></i> Home</a><a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a><a href="timer.html"><i class="fas fa-clock"></i> Timer</a><a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a><a href="budget.html"><i class="fas fa-wallet"></i> Budget</a><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a><a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a><a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a><a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a></div><button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button></nav><div class="page-header"><h1><i class="fas fa-clock"></i> Pomodoro Timer</h1><p>Stay focused with timed work and break sessions</p></div><div class="container"><div class="card" style="text-align:center"><div class="mode-btns"><button class="mode-btn active" onclick="setMode('work')">Work (25m)</button><button class="mode-btn" onclick="setMode('short')">Short Break (5m)</button><button class="mode-btn" onclick="setMode('long')">Long Break (15m)</button></div><div class="timer-circle"><div class="timer-display" id="timerDisplay">25:00</div><div class="timer-label" id="timerLabel">FOCUS TIME</div></div><div class="timer-controls"><button class="btn btn-primary" onclick="startStop()" id="startBtn"><i class="fas fa-play"></i> Start</button><button class="btn btn-secondary" onclick="resetTimer()"><i class="fas fa-redo"></i> Reset</button></div><div class="session-count">Sessions completed today: <strong id="sessionCount">0</strong></div></div><div class="card mt-2"><h3 style="margin-bottom:12px">Custom Time</h3><div class="flex flex-wrap" style="gap:10px"><div style="flex:1"><label class="text-muted">Work (minutes)</label><input type="number" id="customWork" value="25" min="1" max="60" style="margin-top:6px"></div><div style="flex:1"><label class="text-muted">Short Break</label><input type="number" id="customShort" value="5" min="1" max="30" style="margin-top:6px"></div><div style="flex:1"><label class="text-muted">Long Break</label><input type="number" id="customLong" value="15" min="1" max="60" style="margin-top:6px"></div></div><button class="btn btn-primary mt-2" onclick="applyCustom()"><i class="fas fa-check"></i> Apply Custom Times</button></div></div>
<script>
let modes={work:25*60,short:5*60,long:15*60};
let currentMode="work";
let timeLeft=modes.work;
let timer=null;
let running=false;
let sessions=parseInt(localStorage.getItem("pomSessions")||"0");
document.getElementById("sessionCount").textContent=sessions;
function setMode(m){clearInterval(timer);running=false;currentMode=m;timeLeft=modes[m];document.getElementById("startBtn").innerHTML='<i class="fas fa-play"></i> Start';
document.querySelectorAll(".mode-btn").forEach((b,i)=>{b.classList.remove("active");if((i===0&&m==="work")||(i===1&&m==="short")||(i===2&&m==="long"))b.classList.add("active");});
const labels={work:"FOCUS TIME",short:"SHORT BREAK",long:"LONG BREAK"};
document.getElementById("timerLabel").textContent=labels[m];
updateDisplay();}
function updateDisplay(){const m=Math.floor(timeLeft/60);const s=timeLeft%60;document.getElementById("timerDisplay").textContent=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);document.title=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s)+" | Pomodoro";}
function startStop(){if(running){clearInterval(timer);running=false;document.getElementById("startBtn").innerHTML='<i class="fas fa-play"></i> Resume';}else{running=true;document.getElementById("startBtn").innerHTML='<i class="fas fa-pause"></i> Pause';timer=setInterval(()=>{if(timeLeft>0){timeLeft--;updateDisplay();}else{clearInterval(timer);running=false;if(currentMode==="work"){sessions++;localStorage.setItem("pomSessions",sessions);document.getElementById("sessionCount").textContent=sessions;}new Audio("https://www.soundjay.com/button/sounds/beep-07.mp3").play().catch(()=>{});alert(currentMode==="work"?"Time to take a break!":"Break over! Back to work!");}},1000);}}
function resetTimer(){clearInterval(timer);running=false;timeLeft=modes[currentMode];document.getElementById("startBtn").innerHTML='<i class="fas fa-play"></i> Start';updateDisplay();}
function applyCustom(){modes.work=parseInt(document.getElementById("customWork").value)*60||25*60;modes.short=parseInt(document.getElementById("customShort").value)*60||5*60;modes.long=parseInt(document.getElementById("customLong").value)*60||15*60;setMode(currentMode);}
function toggleTheme(){document.body.classList.toggle("light");const icon=document.querySelector(".theme-toggle i");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}
if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.querySelector(".theme-toggle i").classList.replace("fa-moon","fa-sun");}
</script>
</body>
</html>
