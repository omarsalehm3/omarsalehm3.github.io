<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notes | OGuard Hub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.note-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px;position:relative;transition:transform 0.2s}
.note-card:hover{transform:translateY(-3px)}
.note-card .note-title{font-weight:600;margin-bottom:8px}
.note-card .note-body{color:#8b949e;font-size:0.875rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.note-card .note-date{font-size:0.7rem;color:#6e7681;margin-top:10px}
.note-card .note-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#6e7681;cursor:pointer;font-size:0.9rem}
.note-card .note-del:hover{color:#f85149}
body.light .note-card{background:#fff;border-color:#e0e0e0}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-shield-alt"></i> OGuard Hub</a></div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a>
    <a href="timer.html"><i class="fas fa-clock"></i> Timer</a>
    <a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a>
    <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>
    <a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a>
    <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>
  </div>
  <div class="flex" style="gap:8px;align-items:center">
    <span id="navUser" style="display:none;font-size:0.85rem;color:#8b949e"></span>
    <button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-sticky-note"></i> Quick Notes</h1>
  <p>Jot down ideas that auto-save</p>
</div>

<div class="container">
  <div class="card">
    <input type="text" id="noteTitle" placeholder="Note title..." style="margin-bottom:10px">
    <textarea id="noteBody" placeholder="Write your note here..." style="min-height:120px;resize:vertical;margin-bottom:10px"></textarea>
    <div class="flex" style="justify-content:space-between;align-items:center">
      <span class="text-muted" id="charCount">0 characters</span>
      <div class="flex" style="gap:8px">
        <button class="btn btn-secondary" onclick="clearForm()"><i class="fas fa-times"></i> Clear</button>
        <button class="btn btn-primary" onclick="saveNote()"><i class="fas fa-save"></i> Save Note</button>
      </div>
    </div>
  </div>
  <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:15px">
    <input type="text" id="searchNotes" placeholder="Search notes..." style="flex:1;max-width:300px" oninput="renderNotes()">
    <button class="btn btn-danger" style="padding:8px 14px;font-size:0.85rem" onclick="clearAllNotes()"><i class="fas fa-trash"></i> Clear All</button>
  </div>
  <div class="notes-grid" id="notesList"></div>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
var editingId = null;
var notes = JSON.parse(localStorage.getItem('quicknotes') || '[]');

function saveNote() {
  var title = document.getElementById('noteTitle').value.trim() || 'Untitled';
  var body = document.getElementById('noteBody').value.trim();
  if (!body) {
    alert('Please write something in the note body before saving.');
    return;
  }
  if (editingId !== null) {
    for (var i = 0; i < notes.length; i++) {
      if (notes[i].id === editingId) {
        notes[i].title = title;
        notes[i].body = body;
        notes[i].date = new Date().toLocaleString();
        break;
      }
    }
    editingId = null;
  } else {
    notes.unshift({id: Date.now(), title: title, body: body, date: new Date().toLocaleString()});
  }
  clearForm();
  localStorage.setItem('quicknotes', JSON.stringify(notes));
  renderNotes();
}

function deleteNote(id) {
  notes = notes.filter(function(n) { return n.id !== id; });
  localStorage.setItem('quicknotes', JSON.stringify(notes));
  renderNotes();
}

function editNote(id) {
  var n = null;
  for (var i = 0; i < notes.length; i++) {
    if (notes[i].id === id) { n = notes[i]; break; }
  }
  if (!n) return;
  editingId = id;
  document.getElementById('noteTitle').value = n.title;
  document.getElementById('noteBody').value = n.body;
  document.getElementById('charCount').textContent = n.body.length + ' characters';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function clearForm() {
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  document.getElementById('charCount').textContent = '0 characters';
  editingId = null;
}

function clearAllNotes() {
  if (confirm('Delete all notes? This cannot be undone.')) {
    notes = [];
    localStorage.setItem('quicknotes', JSON.stringify(notes));
    renderNotes();
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderNotes() {
  var q = document.getElementById('searchNotes').value.toLowerCase();
  var filtered = notes.filter(function(n) {
    return n.title.toLowerCase().indexOf(q) !== -1 || n.body.toLowerCase().indexOf(q) !== -1;
  });
  var grid = document.getElementById('notesList');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="text-muted" style="grid-column:1/-1;text-align:center;padding:40px">No notes yet. Write your first note above!</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var n = filtered[i];
    var preview = escapeHtml(n.body.substring(0, 200)) + (n.body.length > 200 ? '...' : '');
    var safeTitle = escapeHtml(n.title);
    var safeDate = escapeHtml(n.date);
    html += '<div class="note-card">';
    html += '<button class="note-del" onclick="deleteNote(' + n.id + ')"><i class="fas fa-times"></i></button>';
    html += '<div class="note-title">' + safeTitle + '</div>';
    html += '<div class="note-body">' + preview + '</div>';
    html += '<div class="note-date">' + safeDate + ' &nbsp; <a href="#" onclick="editNote(' + n.id + ');return false;" style="color:#58a6ff">Edit</a></div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

document.getElementById('noteBody').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + ' characters';
});

function toggleTheme() {
  document.body.classList.toggle('light');
  var icon = document.querySelector('.theme-toggle i');
  icon.classList.toggle('fa-moon');
  icon.classList.toggle('fa-sun');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
}

renderNotes();
</script>
</body>
</html>
