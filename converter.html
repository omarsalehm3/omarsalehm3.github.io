<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Unit Converter | Omars Toolkit</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body><nav class="navbar"><div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-tools"></i> Omars Toolkit</a></div><div class="nav-links"><a href="index.html"><i class="fas fa-home"></i> Home</a><a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a><a href="timer.html"><i class="fas fa-clock"></i> Timer</a><a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a><a href="budget.html"><i class="fas fa-wallet"></i> Budget</a><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a><a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a><a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a><a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a></div><div class="flex" style="gap:8px;align-items:center"><span id="navUser" style="display:none;font-size:0.85rem;color:#8b949e"></span><button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button><button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button></div></nav><div class="page-header"><h1><i class="fas fa-exchange-alt"></i> Unit Converter</h1><p>Convert between common units instantly</p></div><div class="container"><div class="card"><div class="flex flex-wrap mt-1" style="gap:10px;margin-bottom:15px"><select id="convType" onchange="renderConverter()" style="width:200px"><option value="length">Length</option><option value="weight">Weight</option><option value="temp">Temperature</option><option value="speed">Speed</option><option value="area">Area</option><option value="volume">Volume</option><option value="data">Data Storage</option></select></div><div id="converterContent"></div></div></div><script type="module" src="firebase-config.js"></script><script>const convData={length:{units:["Meter","Kilometer","Mile","Foot","Inch","Centimeter","Yard"],toBase:[1,1000,1609.344,0.3048,0.0254,0.01,0.9144]},weight:{units:["Kilogram","Gram","Pound","Ounce","Ton"],toBase:[1,0.001,0.453592,0.0283495,1000]},speed:{units:["m/s","km/h","mph","knot"],toBase:[1,0.277778,0.44704,0.514444]},area:{units:["m2","km2","Hectare","Acre","ft2"],toBase:[1,1e6,10000,4046.86,0.092903]},volume:{units:["Liter","Milliliter","Gallon","Cup","Fluid Oz"],toBase:[1,0.001,3.78541,0.236588,0.0295735]},data:{units:["Byte","KB","MB","GB","TB"],toBase:[1,1024,1048576,1073741824,1099511627776]}};function renderConverter(){const t=document.getElementById("convType").value;const div=document.getElementById("converterContent");if(t==="temp"){div.innerHTML="<div class="flex flex-wrap" style="gap:15px;align-items:flex-end"><div style="flex:1"><label class="text-muted">Value</label><input type="number" id="tempVal" value="0" oninput="convertTemp()" style="margin-top:6px"></div><div style="flex:1"><label class="text-muted">From</label><select id="tempFrom" onchange="convertTemp()" style="margin-top:6px"><option>Celsius</option><option>Fahrenheit</option><option>Kelvin</option></select></div></div><div id="tempResults" class="mt-2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px"></div>";convertTemp();return;}const d=convData[t];div.innerHTML="<div class="flex flex-wrap" style="gap:15px;align-items:flex-end"><div style="flex:1"><label class="text-muted">Value</label><input type="number" id="convVal" value="1" oninput="convertUnit()" style="margin-top:6px"></div><div style="flex:1"><label class="text-muted">From</label><select id="convFrom" onchange="convertUnit()" style="margin-top:6px">"+d.units.map(function(u){return "<option>"+u+"</option>"}).join("")+"</select></div></div><div id="convResults" class="mt-2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px"></div>";convertUnit();}function convertUnit(){const t=document.getElementById("convType").value;const d=convData[t];const val=parseFloat(document.getElementById("convVal").value)||0;const fromIdx=document.getElementById("convFrom").selectedIndex;const base=val*d.toBase[fromIdx];const res=document.getElementById("convResults");res.innerHTML=d.units.map(function(u,i){return "<div style="background:rgba(88,166,255,0.08);border:1px solid #30363d;border-radius:10px;padding:12px"><div class="text-muted" style="font-size:0.75rem">"+u+"</div><div style="font-size:1.2rem;font-weight:600;color:#58a6ff;margin-top:4px">"+(base/d.toBase[i]).toLocaleString(undefined,{maximumFractionDigits:6})+"</div></div>"}).join("");}function convertTemp(){const val=parseFloat(document.getElementById("tempVal").value)||0;const from=document.getElementById("tempFrom").value;let c;if(from==="Celsius")c=val;else if(from==="Fahrenheit")c=(val-32)*5/9;else c=val-273.15;const results=[["Celsius",c],["Fahrenheit",c*9/5+32],["Kelvin",c+273.15]];document.getElementById("tempResults").innerHTML=results.map(function(r){return "<div style="background:rgba(88,166,255,0.08);border:1px solid #30363d;border-radius:10px;padding:12px"><div class="text-muted" style="font-size:0.75rem">"+r[0]+"</div><div style="font-size:1.2rem;font-weight:600;color:#58a6ff;margin-top:4px">"+r[1].toFixed(4)+"</div></div>"}).join("");}function toggleTheme(){document.body.classList.toggle("light");const icon=document.querySelector(".theme-toggle i");icon.classList.toggle("fa-moon");icon.classList.toggle("fa-sun");localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");}if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");document.querySelector(".theme-toggle i").classList.replace("fa-moon","fa-sun");}renderConverter();</script></body></html>
