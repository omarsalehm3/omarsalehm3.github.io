<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List | Omar's Toolkit</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none"><i class="fas fa-tools"></i> Omar's Toolkit</a></div>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="todo.html"><i class="fas fa-check-square"></i> To-Do</a>
    <a href="timer.html"><i class="fas fa-clock"></i> Timer</a>
    <a href="converter.html"><i class="fas fa-exchange-alt"></i> Converter</a>
    <a href="budget.html"><i class="fas fa-wallet"></i> Budget</a>
    <a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a>
    <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
    <a href="weather.html"><i class="fas fa-cloud-sun"></i> Weather</a>
    <a href="chatbot.html"><i class="fas fa-robot"></i> AI Chat</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
</nav>
<div class="page-header">
  <h1><i class="fas fa-check-square"></i> To-Do List</h1>
  <p>Manage your tasks with categories and priorities</p>
</div>
<div class="container">
  <div class="card">
    <div class="flex flex-wrap" style="gap:10px;margin-bottom:15px;">
      <input type="text" id="taskInput" placeholder="Add a new task..." style="flex:1;min-width:200px;">
      <select id="categorySelect" style="width:140px;">
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="study">Study</option>
        <option value="health">Health</option>
        <option value="other">Other</option>
      </select>
      <select id="prioritySelect" style="width:120px;">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button class="btn btn-primary" onclick="addTask()"><i class="fas fa-plus"></i> Add</button>
    </div>
    <div class="flex" style="gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="filterTasks('all')">All</button>
      <button class="btn btn-secondary" onclick="filterTasks('personal')">Personal</button>
      <button class="btn btn-secondary" onclick="filterTasks('work')">Work</button>
      <button class="btn btn-secondary" onclick="filterTasks('study')">Study</button>
      <button class="btn btn-secondary" onclick="filterTasks('health')">Health</button>
    </div>
  </div>
  <div class="card" id="statsCard">
    <div class="flex" style="gap:20px;flex-wrap:wrap;">
      <div><span id="totalCount">0</span> <span class="text-muted">Total</span></div>
      <div><span id="doneCount">0</span> <span class="text-muted">Done</span></div>
      <div><span id="pendingCount">0</span> <span class="text-muted">Pending</span></div>
    </div>
  </div>
  <div id="taskList"></div>
</div>
<script>
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
let currentFilter='all';
function addTask(){const text=document.getElementById('taskInput').value.trim();if(!text)return;tasks.push({id:Date.now(),text,category:document.getElementById('categorySelect').value,priority:document.getElementById('prioritySelect').value,done:false,date:new Date().toLocaleDateString()});document.getElementById('taskInput').value='';saveTasks();}
function toggleDone(id){const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;saveTasks();}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();}
function filterTasks(cat){currentFilter=cat;renderTasks();}
function saveTasks(){localStorage.setItem('tasks',JSON.stringify(tasks));renderTasks();}
function renderTasks(){const list=document.getElementById('taskList');const filtered=currentFilter==='all'?tasks:tasks.filter(t=>t.category===currentFilter);const pc={high:'#f85149',medium:'#d29922',low:'#3fb950'};list.innerHTML=filtered.length===0?'<div class="card text-muted" style="text-align:center;padding:40px">No tasks yet! Add one above.</div>':filtered.map(t=>'<div class="card flex" style="justify-content:space-between;gap:10px;opacity:'+(t.done?0.6:1)+'"><div style="display:flex;align-items:center;gap:12px;flex:1;"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleDone('+t.id+')" style="width:18px;height:18px;cursor:pointer;accent-color:#58a6ff;"><div><div style="text-decoration:'+(t.done?'line-through':'none')+';font-weight:500">'+t.text+'</div><div style="font-size:0.75rem;color:#8b949e;margin-top:4px">'+t.category+' &middot; <span style="color:'+pc[t.priority]+'">'+t.priority+' priority</span> &middot; '+t.date+'</div></div></div><button class="btn btn-danger" style="padding:6px 12px;font-size:0.8rem" onclick="deleteTask('+t.id+')"><i class="fas fa-trash"></i></button></div>').join('');document.getElementById('totalCount').textContent=tasks.length;document.getElementById('doneCount').textContent=tasks.filter(t=>t.done).length;document.getElementById('pendingCount').textContent=tasks.filter(t=>!t.done).length;}
document.getElementById('taskInput').addEventListener('keypress',e=>{if(e.key==='Enter')addTask();});
renderTasks();
function toggleTheme(){document.body.classList.toggle('light');const icon=document.querySelector('.theme-toggle i');icon.classList.toggle('fa-moon');icon.classList.toggle('fa-sun');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');}
if(localStorage.getItem('theme')==='light'){document.body.classList.add('light');document.querySelector('.theme-toggle i').classList.replace('fa-moon','fa-sun');}
</script>
</body>
</html>
